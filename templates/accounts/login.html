{% extends 'base.html' %}
{% load static %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">??</div>
        <h1>BlindBit</h1>
        <p class="auth-subtitle">Sign in to your encrypted workspace</p>
    </div>

    <p class="auth-flow-note">
        If you have 2FA enabled, you will be prompted for your code on the next step.
    </p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autofocus value="{{ username|default:'' }}"
                placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Continue</button>
    </form>
{% endblock %}
