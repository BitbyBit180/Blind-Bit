{% extends 'base.html' %}
{% load static %}
{% block title %}Sign In{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg></div>
        <h1>BlindBit</h1>
        <p class="auth-subtitle">Sign in to your encrypted workspace</p>
    </div>

    <p class="auth-flow-note">
        If you have 2FA enabled, you will be prompted for your TOTP code on the next step.
    </p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autofocus value="{{ username|default:'' }}"
                placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Sign In</button>

        <div style="margin-top: 14px; text-align: center;">
            <p style="color: var(--text-dim); margin-bottom: 10px; font-size: 13px;">or</p>
            <a href="{% url 'register' %}" class="btn btn-ghost btn-full">Create Account</a>
        </div>
    </form>
</div>
{% endblock %}
